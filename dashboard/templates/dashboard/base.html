<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom scrollbar for a cleaner feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex h-screen overflow-hidden">

        <div id="mobile-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black opacity-50 z-20 hidden lg:hidden"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-64 bg-white border-r border-gray-200 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
            
            <div class="h-16 flex items-center px-8 border-b border-gray-100">
                <div class="flex items-center gap-2 text-indigo-600">
                    <i class="fas fa-brain text-2xl"></i> <span class="text-lg font-bold text-gray-900 tracking-tight">KnowledgeHub</span>
                </div>
            </div>

            <nav class="flex-1 py-6 px-4 space-y-1 overflow-y-auto">
                
                <a href="{% url 'dashboard' %}" 
                   class="group flex items-center px-4 py-3 text-sm font-medium text-gray-600 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 transition-colors relative">
                    <i class="fas fa-comments w-6 text-lg text-gray-400 group-hover:text-indigo-600 transition-colors"></i>
                    <span class="ml-3">AI Chatbot</span>
                </a>

                <a href="{% url 'knowledge-home' %}" 
                   class="group flex items-center px-4 py-3 text-sm font-medium text-gray-600 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                    <i class="fas fa-folder-open w-6 text-lg text-gray-400 group-hover:text-indigo-600 transition-colors"></i>
                    <span class="ml-3">Knowledge Base</span>
                </a>

                <a href="#" class="group flex items-center px-4 py-3 text-sm font-medium text-gray-600 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                    <i class="fas fa-cog w-6 text-lg text-gray-400 group-hover:text-indigo-600 transition-colors"></i>
                    <span class="ml-3">Settings</span>
                </a>

            </nav>

            <div class="p-4 border-t border-gray-100">
                <a href="{% url 'logout' %}" class="flex items-center px-4 py-3 text-sm font-medium text-red-500 rounded-lg hover:bg-red-50 transition-colors">
                    <i class="fas fa-sign-out-alt w-6 text-lg"></i>
                    <span class="ml-3">Logout</span>
                </a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col h-screen overflow-hidden lg:ml-64">
            
            <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-4 lg:px-8">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 text-gray-500 hover:text-gray-700 focus:outline-none">
                    <i class="fas fa-bars text-xl"></i>
                </button>

                <div class="flex items-center gap-4">
                    <h2 class="text-lg font-semibold text-gray-700">Dashboard</h2>
                </div>

                <div class="flex items-center gap-4">
                    <button class="text-gray-400 hover:text-gray-600"><i class="fas fa-bell"></i></button>
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm">
                        {{ user.username|slice:":1"|upper }}
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-4 md:p-8">
                {% block content %}
                {% endblock %}
            </main>

        </div>

    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                // Open Sidebar
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                // Close Sidebar
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
